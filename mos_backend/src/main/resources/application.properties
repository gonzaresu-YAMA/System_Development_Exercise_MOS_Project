spring.application.name=mos_backend
spring.config.import=optional:file:.env[.properties]
# ── DataSource (MariaDB) ─────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}


# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── SQL 初期化 ───────────────────────────────────────────
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ── Spring Session ───────────────────────────────────────
spring.session.jdbc.initialize-schema=never

# ── Security (開発用：デフォルト無効化) ──────────────────
spring.security.user.name=${SECURITY_USER_NAME:admin}
spring.security.user.password=${SECURITY_USER_PASSWORD:admin}

# ── レジ（POS）連携設定 ──────────────────────────────────
# getOrders で返す店舗ID（レジ側 stores テーブルの store_id と一致させる）
mos.pos.store-id=${POS_STORE_ID:MH}
# 全商品に一律で適用する消費税率（%）
mos.pos.tax-rate=${POS_TAX_RATE:10}
